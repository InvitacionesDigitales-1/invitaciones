    <style>
  body {
    margin: 0;
    padding: 0;

    background-repeat: repeat;
    background-attachment: fixed;
    font-family: 'TangerineBold', serif;
    color: black;
}

html, body {
    height: 100%;
}

/* Contenedor del marco de filigrana */
.marco-elegante {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* No estorba los clics ni botones */
    z-index: 999; /* Se mantiene por encima de todo */
}

/* Configuración de las esquinas ornamentadas (MÁS NOTORIAS) */
.esquina-svg {
    position: absolute;
    width: 120px; /* Aumentamos el tamaño en PC para que destaque */
    height: 120px;
    
    /* COLOR REFORZADO: Un magenta/morado vibrante muy notorio */
    fill: #ff4d6d; 
    
    /* CONTORNO: Añade una línea exterior blanca para definir los bordes */
    stroke: #ffffff;
    stroke-width: 1.5px;
    
    /* AURA DE LUZ REFORZADA: Triple sombra acumulada para un brillo intenso */
    filter: drop-shadow(0px 0px 8px #ff4d6d) 
            drop-shadow(0px 0px 15px #c77dff)
            drop-shadow(0px 0px 2px rgba(255, 255, 255, 0.8));
            
    transition: transform 0.3s ease, fill 0.5s ease, filter 0.5s ease;
}

/* Posicionamiento y rotación para que encajen perfectamente */
.m-top-left     { top: 15px; left: 15px; }
.m-top-right    { top: 15px; right: 15px; transform: scaleX(-1); }
.m-bottom-left  { bottom: 15px; left: 15px; transform: scaleY(-1); }
.m-bottom-right { bottom: 15px; right: 15px; transform: scale(-1); }

/* Ajuste fino para pantallas de celulares (Mantenemos buena visibilidad) */
@media (max-width: 768px) {
    .esquina-svg {
        width: 80px; /* Tamaño ideal y llamativo en celular */
        height: 80px;
        stroke-width: 2px; /* Contorno un poco más grueso en móvil */
    }
    .m-top-left     { top: 10px; left: 10px; }
    .m-top-right    { top: 10px; right: 10px; transform: scaleX(-1); }
    .m-bottom-left  { bottom: 10px; left: 10px; transform: scaleY(-1); }
    .m-bottom-right { bottom: 10px; right: 10px; transform: scale(-1); }
}

<script>
const eventDate = new Date("November 20, 2026 19:00:00").getTime();

const countdown = setInterval(() => {
    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        ` ${days}dias ${hours}hr ${minutes}min ${seconds}seg`;

    if (distance < 0) {
        clearInterval(countdown);
        document.getElementById("countdown").innerHTML = "🎉 ¡Hoy es el evento!";
    }
}, 1000);

const musica = document.getElementById("musica");
const btnMusica = document.getElementById("btnMusica");

btnMusica.addEventListener("click", () => {
    musica.play();

    btnMusica.innerHTML = "🎵 Reproduciendo...";
    btnMusica.disabled = true;
});


// Animación del marco dinámico interactivo
const esquinasSvg = document.querySelectorAll('.esquina-svg');

// En móviles: Cambia de color sutilmente al deslizar hacia abajo
window.addEventListener('scroll', () => {
    const scrollMax = document.documentElement.scrollHeight - window.innerHeight;
    if (scrollMax <= 0) return;
    
    const porcentaje = window.scrollY / scrollMax;
    
    esquinasSvg.forEach(esquina => {
        // Hace una transición suave entre rosa pastel y un morado luminoso (#e0aaff)
        if (porcentaje > 0.3) {
            esquina.style.fill = '#e0aaff';
            esquina.style.transform = esquina.classList.contains('m-top-right') ? 'scaleX(-1) scale(1.05)' : 
                                      esquina.classList.contains('m-bottom-left') ? 'scaleY(-1) scale(1.05)' :
                                      esquina.classList.contains('m-bottom-right') ? 'scale(-1) scale(1.05)' : 'scale(1.05)';
        } else {
            esquina.style.fill = '#ffd6e0';
            esquina.style.transform = esquina.classList.contains('m-top-right') ? 'scaleX(-1)' : 
                                      esquina.classList.contains('m-bottom-left') ? 'scaleY(-1)' :
                                      esquina.classList.contains('m-bottom-right') ? 'scale(-1)' : 'none';
        }
    });
});
</script>
